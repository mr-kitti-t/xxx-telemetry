<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Details | Telemetry Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @keyframes wave {
            0% { transform: translateX(-50%) skewY(-3deg); }
            50% { transform: translateX(-50%) skewY(3deg); }
            100% { transform: translateX(-50%) skewY(-3deg); }
        }
        .liquid-wave {
            animation: wave 3s ease-in-out infinite;
            left: 50%;
            width: 200%;
        }

        /* Pulse Animation for Critical Font */
        @keyframes critical-pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); } /* 10% Increase */
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-critical {
            display: inline-block; /* Required for transform scaling to work perfectly */
            animation: critical-pulse 1.5s ease-in-out infinite;
        }        
        
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navigation -->
    <nav class="bg-blue-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="dashboard.html" class="flex items-center text-blue-200 hover:text-white transition">
                <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
            </a>
            <div id="navTitle" class="text-center font-bold tracking-widest uppercase text-sm">
                Loading Tank...
            </div>
            <div class="flex space-x-4">
                <button onclick="window.print()" class="text-blue-200 hover:text-white"><i class="fas fa-print"></i></button>
                <div class="w-8 h-8 rounded-full bg-blue-700 flex items-center justify-center">
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 px-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- LEFT COLUMN: Visual Tank -->
        <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center">
            <h3 id="siteLabel" class="text-gray-500 font-bold uppercase text-xs mb-8 tracking-widest">Site: ---</h3>
            
            <div class="relative w-48 h-80 bg-gray-100 border-4 border-gray-300 rounded-b-3xl rounded-t-lg overflow-hidden shadow-inner">
                <div id="liquidLevel" class="absolute bottom-0 opacity-80 liquid-wave transition-all duration-1000"></div>
                
                <div class="absolute inset-0 flex items-center justify-center">
                    <span id="percentLabel" class="text-4xl font-black drop-shadow-sm transition-colors duration-500">0%</span>
                </div>
            </div>

            <div class="w-full mt-8 space-y-3">
                <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                    <span class="text-gray-500 text-sm">Temperature</span>
                    <span class="font-mono font-bold text-blue-600">-25.00 °C</span>
                </div>
                <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                    <span class="text-gray-500 text-sm">Total Weight</span>
                    <span id="weightLabel" class="font-mono font-bold text-gray-800">-- T</span>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN: Data Table -->
        <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-gray-700"><i class="fas fa-history mr-2 text-blue-500"></i> Historical Log (Dynamic)</h3>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-[10px] font-bold tracking-wider">
                        <tr>
                            <th class="px-6 py-3">Time Stamp</th>
                            <th class="px-6 py-3">Level (%)</th>
                            <th class="px-6 py-3">Weight (T)</th>
                            <th class="px-6 py-3">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const TANK_DATA = {
            "tank1": { name: "Main Storage Tank A", site: "Alpha", level: 100 },
            "tank2": { name: "High-High Demo", site: "Alpha", level: 98 },
            "tank3": { name: "High-Warn Demo", site: "Beta", level: 88 },
            "tank4": { name: "Normal Demo", site: "Beta", level: 55 },
            "tank5": { name: "Low-Advisory Demo", site: "Gamma", level: 18 },
            "tank6": { name: "Low-Low Demo", site: "Gamma", level: 4 },
            "tank7": { name: "Backup Tank 01", site: "Delta", level: 42 },
            "tank8": { name: "Backup Tank 02", site: "Delta", level: 91 },
            "tank9": { name: "Process Tank X", site: "Epsilon", level: 12 },
            "tank10": { name: "Process Tank Y", site: "Epsilon", level: 96 }
        };

        const params = new URLSearchParams(window.location.search);
        const tankId = params.get('id') || 'tank1';
        const tank = TANK_DATA[tankId];

        if (tank) {
            const liquidEl = document.getElementById('liquidLevel');
            const percentEl = document.getElementById('percentLabel');
            let badgeBg, badgeText, statusLabel;

            document.getElementById('navTitle').innerText = tank.name;
            document.getElementById('siteLabel').innerText = `Site: ${tank.site}`;
            percentEl.innerText = `${tank.level}%`;
            liquidEl.style.height = `${tank.level}%`;
            document.getElementById('weightLabel').innerText = `${(tank.level * 1.2).toFixed(2)} T`;

            // Color Logic with Hex Codes
            if(tank.level <= 5 || tank.level >= 95) {
                // CRITICAL (Red)
                liquidEl.style.backgroundColor = '#DC2626'; 
                percentEl.style.color = '#7F1D1D';
                percentEl.classList.add('animate-critical');
                badgeBg = '#FEE2E2'; badgeText = '#7F1D1D'; statusLabel = 'Critical';
            } 
            else if(tank.level <= 20 || tank.level >= 85) {
                // WARNING (Amber)
                liquidEl.style.backgroundColor = '#F59E0B'; 
                percentEl.style.color = '#78350F';
                badgeBg = '#FEF3C7'; badgeText = '#78350F'; statusLabel = 'Warning';
            } 
            else {
                // NORMAL (Blue)
                liquidEl.style.backgroundColor = '#3B82F6'; 
                percentEl.style.color = '#1E3A8A';
                badgeBg = '#DBEAFE'; badgeText = '#1E3A8A'; statusLabel = 'Active';
            }

            // Generate Logs with matching Badge Colors
            const tbody = document.getElementById('logBody');
            for(let i=0; i<6; i++) {
                const row = `
                    <tr class="hover:bg-blue-50 transition-colors">
                        <td class="px-6 py-4 font-mono text-gray-600 text-xs">12/03/2026 ${15-i}:00:00</td>
                        <td class="px-6 py-4 font-bold text-gray-700">${tank.level}%</td>
                        <td class="px-6 py-4 text-gray-700">${(tank.level * 1.2).toFixed(2)}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase" 
                                  style="background-color: ${badgeBg}; color: ${badgeText};">
                                ${statusLabel}
                            </span>
                        </td>
                    </tr>`;
                tbody.innerHTML += row;
            }
        }
    </script>
</body>
</html>
